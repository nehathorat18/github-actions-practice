#Goal- To install multiple python versions using matrix strategy

name: Matrix
on:
  workflow_dispatch:    
jobs:
  python:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        exclude: 
          - os: windows-latest  
            python-version: "3.10"
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v7      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Print Python version
        run: python --version
