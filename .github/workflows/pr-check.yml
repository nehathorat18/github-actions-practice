name: prcheck
on: 
  pull_request:
    branches: [main]

jobs:
  pr-check:
    runs-on: ubuntu-latest
    steps:
      - name: PR check running for branch
        run: echo "PR check running for branch ${{ github.head_ref }}"
      - name: Print date
        run: date
      - name: print check
        run: echo "Checking pr request changes"
